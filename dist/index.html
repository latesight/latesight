<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="/asserts/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/asserts/favicon-16x16.png?v=3">
    <link rel="shortcut icon" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <meta name="theme-color" content="#ffffff">
    <title>ibmx</title>
    <style>
      :root {
        color-scheme: light;
        --text-primary: #fffaf3;
        --text-secondary: rgba(255, 250, 243, 0.86);
        --panel-bg: rgba(126, 178, 220, 0.18);
        --panel-border: rgba(255, 255, 255, 0.32);
        --panel-shadow: rgba(79, 138, 186, 0.28);
        --text-shadow: rgba(77, 131, 176, 0.45);
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 72px;
        box-sizing: border-box;
        font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", sans-serif;
        background:
          linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)),
          url("asserts/ballon-background.png") center / cover no-repeat;
      }

      .hero {
        min-width: min(78vw, 520px);
        margin-top: 48px;
        padding: 0;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .date-diff {
        color: var(--text-primary);
        font-size: clamp(24px, 4.2vw, 38px);
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.1em;
        text-shadow: 0 2px 8px rgba(57, 43, 22, 0.18);
        color: #6f634d;
      }

      .tagline {
        width: min(78vw, 860px);
        margin: 28px auto 0;
        color: var(--text-primary);
        font-size: clamp(64px, 9.5vw, 126px);
        line-height: 0.9;
        letter-spacing: 0.03em;
        text-transform: lowercase;
        text-align: center;
        text-shadow: 0 16px 38px rgba(77, 131, 176, 0.62);
        font-family: "Apple Garamond", "ITC Garamond Narrow", "Baskerville",
          "Times New Roman", serif;
      }

      .hero-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
        background: #111;
      }

      .macintosh {
        width: min(100%, 408px);
        margin: 0 auto;
        padding: 18px 20px 18px;
        border-radius: 32px 32px 24px 24px;
        background: linear-gradient(180deg, #f1e5cd 0%, #d0bb95 100%);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.55),
          inset 0 -12px 20px rgba(121, 92, 49, 0.2),
          0 20px 42px rgba(48, 79, 109, 0.24);
        border: 1px solid rgba(135, 108, 63, 0.28);
        position: relative;
      }

      .macintosh::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        width: 72px;
        height: 12px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: rgba(121, 92, 49, 0.14);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.26);
      }

      .mac-screen {
        aspect-ratio: 4 / 3;
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(180deg, #61584f 0%, #26211d 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          inset 0 -4px 10px rgba(0, 0, 0, 0.45);
      }

      .mac-screen-inner {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 12px;
        background: #111;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .mac-screen-inner::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 255, 255, 0.26), transparent 26%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.08));
        pointer-events: none;
      }

      .mac-top-mark {
        margin: 8px 0 12px;
        font-size: 9px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(89, 74, 49, 0.62);
      }

      .mac-base {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-top: 16px;
      }

      .mac-speaker {
        width: 56px;
        height: 86px;
        border-radius: 9px;
        background:
          repeating-linear-gradient(
            180deg,
            rgba(118, 92, 58, 0.5) 0 2px,
            transparent 2px 8px
          ),
          linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(0, 0, 0, 0.04));
        box-shadow: inset 0 0 0 1px rgba(117, 90, 54, 0.12);
      }

      .mac-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .mac-drive {
        width: 132px;
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(180deg, rgba(155, 127, 84, 0.24), rgba(91, 70, 42, 0.34));
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.3),
          0 1px 0 rgba(87, 62, 28, 0.08);
      }

      .mac-drive-notch {
        width: 18px;
        height: 3px;
        border-radius: 999px;
        background: rgba(84, 61, 32, 0.42);
        margin-top: -3px;
      }

      .mac-badge {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 12px 8px 10px;
        border-radius: 12px;
        background: rgba(255, 248, 234, 0.48);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -1px 0 rgba(119, 89, 50, 0.08);
      }

      .mac-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 2px;
      }

      .mac-control {
        min-width: 52px;
        height: 28px;
        padding: 0 10px;
        border: 1px solid rgba(118, 91, 54, 0.24);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 252, 244, 0.92), rgba(221, 203, 168, 0.92));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 1px 1px rgba(92, 69, 35, 0.08);
        color: #6e5f47;
        font: 600 12px/1 "Avenir Next", "Helvetica Neue", sans-serif;
        letter-spacing: 0.04em;
        cursor: pointer;
      }

      .mac-control:active {
        transform: translateY(1px);
        box-shadow: inset 0 2px 4px rgba(92, 69, 35, 0.12);
      }

      .mac-control.is-active {
        background: linear-gradient(180deg, rgba(255, 246, 225, 0.96), rgba(210, 181, 125, 0.96));
      }

      .mac-logo-img {
        width: 19px;
        height: 24px;
        display: block;
        flex: none;
      }

      .macintosh::after {
        content: "";
        position: absolute;
        bottom: 10px;
        left: 18px;
        right: 18px;
        height: 8px;
        border-radius: 999px;
        background: rgba(112, 86, 47, 0.08);
      }

      @media (max-width: 768px) {
        body {
          padding: 32px 16px 48px;
          background-position: center center;
        }

        .hero {
          min-width: auto;
          width: min(100%, 340px);
          margin-top: 36px;
          padding: 0;
        }

        .date-diff {
          font-size: clamp(20px, 6vw, 28px);
        }

        .macintosh {
          width: min(100%, 372px);
          padding: 16px 16px 15px;
          border-radius: 24px 24px 18px 18px;
        }

        .mac-screen {
          padding: 14px;
          border-radius: 14px;
        }

        .mac-base {
          gap: 14px;
          margin-top: 14px;
        }

        .mac-speaker {
          width: 46px;
          height: 74px;
        }

        .mac-drive {
          width: 110px;
        }

        .mac-logo-img {
          width: 16px;
          height: 20px;
        }

        .mac-badge {
          gap: 8px;
          padding: 7px 10px 7px 9px;
        }

        .mac-controls {
          gap: 6px;
        }

        .mac-control {
          min-width: 46px;
          height: 26px;
          padding: 0 8px;
          font-size: 11px;
        }

        .tagline {
          width: min(88vw, 460px);
          margin-top: 24px;
          font-size: clamp(48px, 13vw, 72px);
          line-height: 0.92;
          letter-spacing: 0.02em;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-label="Day counter">
      <div class="macintosh" aria-label="Macintosh video frame">
        <div class="mac-top-mark">Macintosh</div>
        <div class="mac-screen">
          <div class="mac-screen-inner">
            <video class="hero-video" id="hero-video" autoplay muted loop playsinline>
              <source src="asserts/think-different.mp4" type="video/mp4">
            </video>
          </div>
        </div>
        <div class="mac-base">
          <div class="mac-speaker" aria-hidden="true"></div>
          <div class="mac-center">
            <div class="mac-drive"></div>
            <div class="mac-drive-notch"></div>
            <div class="mac-badge">
              <img class="mac-logo-img" src="asserts/apple-rainbow-logo.svg" alt="Apple logo">
              <div class="date-diff" id="date-diff"></div>
            </div>
            <div class="mac-controls" aria-label="Video controls">
              <button class="mac-control" id="volume-down" type="button" aria-label="Decrease volume">Vol-</button>
              <button class="mac-control" id="volume-up" type="button" aria-label="Increase volume">Vol+</button>
              <button class="mac-control is-active" id="play-toggle" type="button" aria-label="Pause or play">Pause</button>
              <button class="mac-control" id="seek-backward" type="button" aria-label="Seek backward 10 seconds">-10s</button>
              <button class="mac-control" id="seek-forward" type="button" aria-label="Seek forward 10 seconds">+10s</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="tagline">think different.</div>
    <script>
      const heroVideo = document.getElementById("hero-video");
      const volumeDown = document.getElementById("volume-down");
      const volumeUp = document.getElementById("volume-up");
      const playToggle = document.getElementById("play-toggle");
      const seekBackward = document.getElementById("seek-backward");
      const seekForward = document.getElementById("seek-forward");

      const currentDate = new Date();
      const startTime = Date.UTC(2012, 5, 30);
      const currentTime = Date.UTC(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        currentDate.getDate()
      );
      const msPerDay = 24 * 60 * 60 * 1000;
      const dayDiff = Math.floor((currentTime - startTime) / msPerDay);

      document.getElementById("date-diff").textContent = dayDiff;

      function syncControls() {
        const isPaused = heroVideo.paused;
        playToggle.textContent = isPaused ? "Play" : "Pause";
        playToggle.classList.toggle("is-active", !isPaused);
        playToggle.setAttribute("aria-pressed", String(!isPaused));

        const canDecrease = heroVideo.volume > 0;
        const canIncrease = heroVideo.volume < 1;
        volumeDown.classList.toggle("is-active", canDecrease);
        volumeUp.classList.toggle("is-active", canIncrease);
        volumeDown.setAttribute("aria-disabled", String(!canDecrease));
        volumeUp.setAttribute("aria-disabled", String(!canIncrease));
      }

      volumeDown.addEventListener("click", () => {
        heroVideo.muted = false;
        heroVideo.volume = Math.max(0, Math.round((heroVideo.volume - 0.1) * 10) / 10);
        syncControls();
      });

      volumeUp.addEventListener("click", () => {
        heroVideo.muted = false;
        heroVideo.volume = Math.min(1, Math.round((heroVideo.volume + 0.1) * 10) / 10);
        syncControls();
      });

      playToggle.addEventListener("click", async () => {
        if (heroVideo.paused) {
          await heroVideo.play();
        } else {
          heroVideo.pause();
        }
        syncControls();
      });

      seekBackward.addEventListener("click", () => {
        heroVideo.currentTime = Math.max(0, heroVideo.currentTime - 10);
      });

      seekForward.addEventListener("click", () => {
        const duration = Number.isFinite(heroVideo.duration) ? heroVideo.duration : heroVideo.currentTime + 10;
        heroVideo.currentTime = Math.min(duration, heroVideo.currentTime + 10);
      });

      heroVideo.addEventListener("play", syncControls);
      heroVideo.addEventListener("pause", syncControls);
      heroVideo.addEventListener("volumechange", syncControls);

      syncControls();
    </script>
  </body>
</html>
